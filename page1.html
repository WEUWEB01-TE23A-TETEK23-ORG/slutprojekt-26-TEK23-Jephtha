                <figure>

                            <p class="Lore">
                                Arknights: Endfield is a real-time 3D Role-Playing Game (RPG) with strategic elements
                                developed by Hypergryph and published by Gryphline. An initial technical test was held
                                in mainland China (CN) on November 10, 2023, followed by Global (North America, Europe,
                                and Southeast Asia) on January 12, 2024. A beta test for both CN and Global servers
                                began on January 16, 2025. A second beta test for both CN and Global servers began on
                                November 27, 2025, with the full worldwide release of the game on January 22, 2026.
                            </p>
