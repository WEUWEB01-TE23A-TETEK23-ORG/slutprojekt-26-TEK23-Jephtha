                <figure>
                    <div class="grid">
                        <h3>VALLEY IV</h3>
                        <p class="Lore">
                            alley IV is a frontier production region chosen by the UWST. It is located along the fringes
                            of
                            the Civilization Band.

                            When the Aggeloi War finally ended, humanity made plans to push the frontiers further across
                            the
                            world. The United Workers' Syndicates of Talos-II (UWST) directed its focus at Valley IV due
                            to
                            the rich mineral wealth of the region. With the support of Endfield Industries, the UWST
                            began
                            various construction projects in Valley IV. Following the completion of various quarries,
                            mines,
                            and production bases, the UWST began deploying research facilities to pursue energy-related
                            R&D
                            projects such as applied Originium technology and Originium cultivation in Valley IV.
                            The UWST had high hopes and expectations for their Valley IV venture. However, a disastrous
                            accident deprived Valley IV of its Great Originium Oak and the UWST became more conservative
                            in
                            future investments. Fortunately, Endfield has recently expanded the Hub Base Site in Valley
                            IV
                            for carrying out Techno-Protocol testing and production of Protocol facilities. In essence,
                            Endfield investments kept the Valley IV economy afloat for the time being.
                        </p>
                        <h3>WULING</h3>
                        <p class="Lore">
                            Following the disaster, one of the surviving Tianshi named Zhuang Fangyi took charge in
                            rebuilding Wuling. Under her leadership, the people of Wuling continued the development of
                            Xiranite, inventing advanced hydraulic control systems, and constructed new homes for
                            themselves. Tianshi Zhuang Fangyi led the Novel Xiranite-Based Materials Project, which
                            included
                            development of the Xiranite Nexus, an experimental device which could unleash sudden
                            emissions
                            of Xiranite energy that react with Æther energy to seal the Rift. However, after multiple
                            rounds
                            of iterations that failed to deliver the desired results, its development was temporarily
                            suspended.[9][10]

                            HAS shifted their strategy from trying to forcibly close the Wuling VLR through Xiranite
                            concentration to targeted Blight Tide containment. In Year 143, the HAS successfully
                            deployed
                            Wuling's first and largest experimental Tianshi Pillar, known as the Marker Stone. The
                            Marker
                            Stone subsequently became the core of the Xiranite Dam that stretches across Wuling.[9]
                        </p>
                    </div>
